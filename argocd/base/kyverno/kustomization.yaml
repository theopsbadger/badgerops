apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
  - namespace.yaml
  - policies/require-resource-limits.yaml
  - policies/disallow-latest-tag.yaml
  - policies/require-labels.yaml
helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno
    version: 3.7.1
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
