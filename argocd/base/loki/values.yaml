deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable scalable mode components (not needed for single binary)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable bundled components not needed for homelab
minio:
  enabled: false
grafana-agent-operator:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
