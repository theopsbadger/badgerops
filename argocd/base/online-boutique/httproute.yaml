apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: online-boutique
  namespace: online-boutique
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: istio-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - shop.CLUSTER_DOMAIN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          port: 80
          weight: 1
