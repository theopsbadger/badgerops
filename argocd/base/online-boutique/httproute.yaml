apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: online-boutique
  namespace: online-boutique
spec:
  parentRefs:
    - name: istio-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - shop.CLUSTER_DOMAIN
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
