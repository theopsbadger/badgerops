apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# CRDs fetched from the pinned release artifacts.
# standard-install.yaml includes GatewayClass, Gateway, HTTPRoute, ReferenceGrant.
# experimental-install.yaml adds GRPCRoute, TCPRoute, TLSRoute, UDPRoute, BackendTLSPolicy.
# Deploy this application before istio — Istio validates Gateway API CRDs on install.
resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/experimental-install.yaml
