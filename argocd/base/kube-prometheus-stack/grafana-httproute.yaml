apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: istio-gateway
      namespace: istio-gateway
      sectionName: https
  hostnames:
    - grafana.CLUSTER_DOMAIN
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
