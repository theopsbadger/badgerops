# Requires prometheus-operator-crds to be deployed as a separate ArgoCD app first.
# See argocd/base/prometheus-operator-crds/kustomization.yaml for explanation.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - grafana-httproute.yaml
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 69.3.2
    releaseName: kube-prometheus-stack
    namespace: monitoring
    valuesFile: values.yaml
