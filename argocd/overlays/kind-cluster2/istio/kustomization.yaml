apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/istio
patches:
  - target:
      kind: Deployment
      name: istiod
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: istiod
      spec:
        template:
          metadata:
            labels:
              topology.istio.io/network: network2
          spec:
            containers:
              - name: discovery
                env:
                  - name: MESH_ID
                    value: mesh1
                  - name: CLUSTER_ID
                    value: cluster2
                  - name: LOCAL_MESH_NETWORK
                    value: network2
                  - name: GOMEMLIMIT
                    valueFrom:
                      resourceFieldRef:
                        divisor: "0"
                        resource: limits.memory
