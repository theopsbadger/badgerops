apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../base/podinfo
- rollout.yaml
- analysis-template.yaml
patches:
- target:
    kind: HorizontalPodAutoscaler
    name: podinfo
  patch: |
    - op: replace
      path: /spec/minReplicas
      value: 10
    - op: replace
      path: /spec/maxReplicas
      value: 20
    - op: replace
      path: /spec/scaleTargetRef/apiVersion
      value: argoproj.io/v1alpha1
    - op: replace
      path: /spec/scaleTargetRef/kind
      value: Rollout
- target:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: podinfo
  patch: |
    - op: replace
      path: /spec/hostnames/0
      value: podinfo.k8s.badgerops.io
    # The Gateway API controller defaults group and kind on backendRefs after apply.
    # Setting them explicitly prevents ArgoCD drift.
    - op: add
      path: /spec/rules/0/backendRefs/0/group
      value: ""
    - op: add
      path: /spec/rules/0/backendRefs/0/kind
      value: Service
images:
- name: ghcr.io/stefanprodan/podinfo
  newTag: 6.11.0
