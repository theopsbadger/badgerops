apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/kyverno
patches:
  # The kyverno Helm chart does not set spec.conversion on the new policies.kyverno.io
  # CRDs (added in kyverno 3.7.x). The Kubernetes API server defaults conversion.strategy
  # to "None" after apply, causing ArgoCD to see these CRDs as perpetually OutOfSync.
  # This patch explicitly sets the field to match what the API server adds.
  - target:
      kind: CustomResourceDefinition
      name: ".*\\.policies\\.kyverno\\.io"
    patch: |
      - op: add
        path: /spec/conversion
        value:
          strategy: None
