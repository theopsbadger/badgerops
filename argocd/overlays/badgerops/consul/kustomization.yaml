apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/consul
patches:
  # The consul Helm chart omits several fields that the Kubernetes API server adds as
  # defaults after apply, causing ArgoCD to see the StatefulSet as perpetually OutOfSync:
  #   - spec.persistentVolumeClaimRetentionPolicy: defaulted by k8s 1.27+
  #   - spec.volumeClaimTemplates[*].apiVersion/kind: defaulted on PVC templates
  - target:
      kind: StatefulSet
      name: consul-server
    patch: |
      - op: add
        path: /spec/persistentVolumeClaimRetentionPolicy
        value:
          whenDeleted: Retain
          whenScaled: Retain
      - op: add
        path: /spec/volumeClaimTemplates/0/apiVersion
        value: v1
      - op: add
        path: /spec/volumeClaimTemplates/0/kind
        value: PersistentVolumeClaim
