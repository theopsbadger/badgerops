apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/loki
patches:
  # The Kubernetes API server defaults apiVersion/kind on volumeClaimTemplates entries
  # after apply, causing ArgoCD drift. Setting them explicitly to match.
  - target:
      kind: StatefulSet
      name: loki
    patch: |
      - op: add
        path: /spec/volumeClaimTemplates/0/apiVersion
        value: v1
      - op: add
        path: /spec/volumeClaimTemplates/0/kind
        value: PersistentVolumeClaim
