apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/kargo
patches:
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kargo
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: kargo.k8s.badgerops.io
