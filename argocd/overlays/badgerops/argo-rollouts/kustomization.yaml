apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/argo-rollouts
patches:
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: argo-rollouts-dashboard
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: rollouts.k8s.badgerops.io
